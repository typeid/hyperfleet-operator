---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: manifests.hyperfleet.io
spec:
  group: hyperfleet.io
  names:
    kind: Manifest
    listKind: ManifestList
    plural: manifests
    shortNames:
    - hfm
    singular: manifest
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.managementCluster
      name: MC
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.appliedResources
      name: Resources
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Manifest is the Schema for the manifests API.
          It deploys arbitrary Kubernetes resources to a management cluster via DynamoDB desires.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ManifestSpec defines a set of Kubernetes resources to apply
              on a management cluster.
            properties:
              managementCluster:
                description: ManagementCluster is the target MC ID (e.g. mc01).
                minLength: 1
                type: string
              resources:
                description: Resources is the list of Kubernetes resources to apply
                  on the MC.
                items:
                  description: |-
                    ResourceTemplate describes a single Kubernetes resource to apply.
                    The controller extracts apiVersion, metadata.name, and metadata.namespace
                    from Content automatically. Only the plural resource name is required
                    separately because kind-to-resource conversion needs a RESTMapper
                    that the operator doesn't have for MC-side resources. kube-applier-aws
                    uses the plural to build Kubernetes REST paths; if it derived the plural
                    via discovery instead, this field could be dropped.
                  properties:
                    content:
                      description: |-
                        Content is the full Kubernetes resource manifest.
                        Must include apiVersion, kind, and metadata.name at minimum.
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    resource:
                      description: Resource is the plural resource name (e.g. "configmaps",
                        "deployments").
                      minLength: 1
                      type: string
                    watch:
                      description: |-
                        Watch creates a ReadDesire for this resource, mirroring its live state
                        from the MC back into status.resourceStatuses via kube-applier-aws.
                      type: boolean
                  required:
                  - content
                  - resource
                  type: object
                minItems: 1
                type: array
            required:
            - managementCluster
            - resources
            type: object
            x-kubernetes-validations:
            - message: spec.managementCluster is immutable
              rule: self.managementCluster == oldSelf.managementCluster
          status:
            description: ManifestStatus defines the observed state of a Manifest.
            properties:
              appliedResources:
                description: AppliedResources is the number of resources written as
                  ApplyDesires.
                format: int32
                type: integer
              conditions:
                description: |-
                  Conditions represent the latest observations of the manifest's state.
                  Known condition types: Synced.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              phase:
                description: Phase summarizes the manifest's lifecycle state.
                enum:
                - Syncing
                - Applied
                - Deleting
                type: string
              resourceStatuses:
                description: ResourceStatuses contains the mirrored live state of
                  watched resources.
                items:
                  description: ResourceStatus holds the mirrored status of a watched
                    resource from the MC.
                  properties:
                    group:
                      description: Group is the API group (e.g. "batch", "" for core).
                      type: string
                    name:
                      description: Name is metadata.name of the watched resource.
                      type: string
                    namespace:
                      description: Namespace is metadata.namespace (empty for cluster-scoped
                        resources).
                      type: string
                    resource:
                      description: Resource is the plural resource name (e.g. "jobs").
                      type: string
                    status:
                      description: |-
                        Status is the .status sub-object of the live resource mirrored from the MC.
                        Only the status is stored to avoid duplicating the full spec in etcd.
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    version:
                      description: Version is the API version (e.g. "v1").
                      type: string
                  required:
                  - name
                  - resource
                  type: object
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
