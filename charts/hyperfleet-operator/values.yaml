replicaCount: 2

image:
  repository: quay.io/cbusse_openshift/hyperfleet-operator
  tag: ""
  pullPolicy: IfNotPresent

awsRegion: ""
baseDomain: ""

postgres:
  secretName: postgres-dsn
  secretKey: dsn

hyperfleetdb:
  bucketCount: 1

serviceAccount:
  create: true
  name: hyperfleet-operator
  annotations: {}

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}
tolerations: []
