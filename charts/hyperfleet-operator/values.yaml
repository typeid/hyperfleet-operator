replicaCount: 1

image:
  repository: quay.io/cbusse_openshift/hyperfleet-operator
  tag: ""
  pullPolicy: IfNotPresent

awsRegion: ""
fleetDBClusterName: ""

managementClusters:
  - id: mc01
    region: us-east-1
    accountId: "000000000000"

leaderElection:
  enabled: true

serviceAccount:
  create: true
  name: hyperfleet-operator
  annotations: {}

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}
tolerations: []
