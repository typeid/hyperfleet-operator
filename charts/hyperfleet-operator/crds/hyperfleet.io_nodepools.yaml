---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: nodepools.hyperfleet.io
spec:
  group: hyperfleet.io
  names:
    kind: NodePool
    listKind: NodePoolList
    plural: nodepools
    singular: nodepool
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterRef
      name: Cluster
      type: string
    - jsonPath: .spec.replicas
      name: Replicas
      type: integer
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          NodePool is the Schema for the nodepools API.
          It represents a set of worker nodes for a Cluster.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: NodePoolSpec defines the desired state of a NodePool.
            properties:
              clusterRef:
                description: ClusterRef is the name of the Cluster CR this node pool
                  belongs to.
                minLength: 1
                type: string
              management:
                description: Management configures node lifecycle management.
                properties:
                  autoRepair:
                    description: AutoRepair enables automatic replacement of unhealthy
                      nodes.
                    type: boolean
                  upgradeType:
                    description: UpgradeType controls how nodes are upgraded (Replace
                      or InPlace).
                    enum:
                    - Replace
                    - InPlace
                    type: string
                type: object
              platform:
                description: Platform contains cloud-provider-specific node pool configuration.
                properties:
                  aws:
                    description: AWS contains AWS-specific node pool configuration.
                    properties:
                      instanceProfile:
                        description: InstanceProfile is the IAM instance profile for
                          worker nodes.
                        minLength: 1
                        type: string
                      instanceType:
                        description: InstanceType is the EC2 instance type (e.g. m6a.xlarge).
                        minLength: 1
                        type: string
                      rootVolume:
                        description: RootVolume configures the root EBS volume.
                        properties:
                          size:
                            description: Size is the volume size in GiB.
                            format: int32
                            minimum: 1
                            type: integer
                          type:
                            description: Type is the EBS volume type (e.g. gp3).
                            enum:
                            - gp2
                            - gp3
                            - io1
                            - io2
                            - st1
                            - sc1
                            type: string
                        required:
                        - size
                        - type
                        type: object
                      securityGroups:
                        description: SecurityGroups is the list of security group
                          IDs for worker nodes.
                        items:
                          type: string
                        minItems: 1
                        type: array
                      subnetId:
                        description: SubnetId is the subnet where nodes are launched.
                        pattern: ^subnet-[a-z0-9]+$
                        type: string
                    required:
                    - instanceProfile
                    - instanceType
                    - rootVolume
                    - securityGroups
                    - subnetId
                    type: object
                required:
                - aws
                type: object
              release:
                description: Release specifies the OpenShift release for the worker
                  nodes.
                properties:
                  image:
                    description: Image is the release payload image reference.
                    minLength: 1
                    type: string
                required:
                - image
                type: object
              replicas:
                description: Replicas is the desired number of worker nodes.
                format: int32
                minimum: 0
                type: integer
            required:
            - clusterRef
            - management
            - platform
            - release
            - replicas
            type: object
          status:
            description: NodePoolStatus defines the observed state of a NodePool.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest observations of the node pool's state.
                  Known condition types: Ready.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
