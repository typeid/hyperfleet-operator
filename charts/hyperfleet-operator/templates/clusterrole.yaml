# Keep in sync with config/rbac/role.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "hyperfleet-operator.fullname" . }}
  labels:
    {{- include "hyperfleet-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["hyperfleet.io"]
    resources: ["clusters"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["hyperfleet.io"]
    resources: ["clusters/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["hyperfleet.io"]
    resources: ["clusters/finalizers"]
    verbs: ["update"]
  - apiGroups: ["hyperfleet.io"]
    resources: ["hyperfleetmanifests"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["hyperfleet.io"]
    resources: ["hyperfleetmanifests/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["hyperfleet.io"]
    resources: ["hyperfleetmanifests/finalizers"]
    verbs: ["update"]
  - apiGroups: ["hyperfleet.io"]
    resources: ["nodepools"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["hyperfleet.io"]
    resources: ["nodepools/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["hyperfleet.io"]
    resources: ["nodepools/finalizers"]
    verbs: ["update"]
  - apiGroups: ["hyperfleet.io"]
    resources: ["placements"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["hyperfleet.io"]
    resources: ["placements/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
