apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hyperfleet-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hyperfleet-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hyperfleet-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hyperfleet-operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "hyperfleet-operator.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - "ALL"
          args:
            - --aws-region={{ required "awsRegion is required" .Values.awsRegion }}
            - --fleet-db-cluster-name={{ required "fleetDBClusterName is required" .Values.fleetDBClusterName }}
            - --base-domain={{ required "baseDomain is required" .Values.baseDomain }}
            {{- if .Values.leaderElection.enabled }}
            - --leader-elect=true
            {{- end }}
            - --health-probe-bind-address=:8081
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
