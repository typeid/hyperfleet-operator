# Kubernetes requires a headless service for every StatefulSet (spec.serviceName).
# The operator runs as a StatefulSet so each pod gets a stable ordinal (pod-0,
# pod-1, ...) which it parses from its hostname to derive its shard assignment.
# This service does not route traffic — it only exists to satisfy the
# StatefulSet API requirement.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hyperfleet-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hyperfleet-operator.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "hyperfleet-operator.selectorLabels" . | nindent 4 }}
  ports:
    - name: health
      port: 8081
      targetPort: health
      protocol: TCP
