{{- if .Values.compactor.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyperfleet-db-compactor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hyperfleet-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: compactor
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "hyperfleet-operator.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: compactor
  template:
    metadata:
      labels:
        {{- include "hyperfleet-operator.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: compactor
    spec:
      serviceAccountName: {{ include "hyperfleet-operator.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: compactor
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/compactor"]
          args:
            - --interval={{ .Values.compactor.interval }}
            - --retention={{ .Values.compactor.retention }}
            - --metrics-bind-address=:9090
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - "ALL"
          env:
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.secretName | default "postgres-dsn" }}
                  key: {{ .Values.postgres.secretKey | default "dsn" }}
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 30
          {{- with .Values.compactor.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
